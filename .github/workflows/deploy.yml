name: Deploy lesson-7 (EKS + ECR + Helm)

# Повний цикл без ручних дій:
#   1) Terraform: VPC + ECR + EKS (стан у S3, який bootstrap-иться нижче)
#   2) build + push Docker-образу Django в ECR
#   3) helm upgrade --install у кластер (Deployment + Service + HPA + ConfigMap)
#
# Потрібні лише два секрети репозиторію: AWS_ACCESS_KEY_ID та AWS_SECRET_ACCESS_KEY.

on:
  push:
    branches: [lesson-7]
    paths:
      - "lesson-7/**"
      - "Dockerfile"
      - "myproject/**"
      - "requirements.txt"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

env:
  AWS_REGION: us-west-2
  TF_DIR: lesson-7
  CLUSTER_NAME: lesson-7-eks
  STATE_BUCKET: yuriiavr-tf-state-lesson-7
  LOCK_TABLE: terraform-locks

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # Бекенд стейтів має існувати ДО terraform init — створюємо ідемпотентно.
      - name: Bootstrap Terraform backend (S3 + DynamoDB)
        run: |
          set -euo pipefail
          if ! aws s3api head-bucket --bucket "$STATE_BUCKET" 2>/dev/null; then
            aws s3api create-bucket --bucket "$STATE_BUCKET" \
              --region "$AWS_REGION" \
              --create-bucket-configuration LocationConstraint="$AWS_REGION"
            aws s3api put-bucket-versioning --bucket "$STATE_BUCKET" \
              --versioning-configuration Status=Enabled
          fi
          if ! aws dynamodb describe-table --table-name "$LOCK_TABLE" --region "$AWS_REGION" >/dev/null 2>&1; then
            aws dynamodb create-table --table-name "$LOCK_TABLE" \
              --attribute-definitions AttributeName=LockID,AttributeType=S \
              --key-schema AttributeName=LockID,KeyType=HASH \
              --billing-mode PAY_PER_REQUEST --region "$AWS_REGION"
            aws dynamodb wait table-exists --table-name "$LOCK_TABLE" --region "$AWS_REGION"
          fi

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.5"

      - name: Terraform init
        working-directory: ${{ env.TF_DIR }}
        run: terraform init -input=false

      # Бекенд-ресурси створені AWS CLI вище — заводимо їх у стан (лише перший раз).
      - name: Import backend resources
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform import -input=false module.s3_backend.aws_s3_bucket.terraform_state "$STATE_BUCKET" || true
          terraform import -input=false module.s3_backend.aws_dynamodb_table.terraform_locks "$LOCK_TABLE" || true

      - name: Terraform apply
        working-directory: ${{ env.TF_DIR }}
        run: terraform apply -input=false -auto-approve

      - name: Read ECR URL from outputs
        id: tf
        working-directory: ${{ env.TF_DIR }}
        run: echo "ecr_url=$(terraform output -raw ecr_repository_url)" >> "$GITHUB_OUTPUT"

      - name: Login to ECR
        run: |
          aws ecr get-login-password --region "$AWS_REGION" \
            | docker login --username AWS --password-stdin "${ECR_URL%%/*}"
        env:
          ECR_URL: ${{ steps.tf.outputs.ecr_url }}

      - name: Build & push Django image
        run: |
          IMG="${{ steps.tf.outputs.ecr_url }}"
          TAG="${GITHUB_SHA::7}"
          docker build -t "$IMG:$TAG" -t "$IMG:latest" .
          docker push "$IMG:$TAG"
          docker push "$IMG:latest"

      - name: Configure kubectl
        run: aws eks update-kubeconfig --region "$AWS_REGION" --name "$CLUSTER_NAME"

      # metrics-server потрібен, щоб HPA бачив завантаження CPU.
      - name: Install metrics-server
        run: |
          kubectl apply -f https://github.com/kubernetes-sigs/metrics-server/releases/latest/download/components.yaml
          kubectl -n kube-system rollout status deployment/metrics-server --timeout=180s || true

      - uses: azure/setup-helm@v4
        with:
          version: v3.15.2

      - name: Helm deploy
        run: |
          helm upgrade --install django-app ./lesson-7/charts/django-app \
            --set image.repository="${{ steps.tf.outputs.ecr_url }}" \
            --set image.tag="${GITHUB_SHA::7}" \
            --wait --timeout 5m

      - name: Show cluster state
        run: kubectl get deploy,pods,svc,hpa,configmap -l app=django-app -o wide
