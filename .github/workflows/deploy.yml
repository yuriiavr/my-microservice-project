name: Deploy lesson-7

on:
  push:
    branches: [lesson-7]
    paths:
      - "lesson-7/**"
      - "Dockerfile"
      - "myproject/**"
      - "requirements.txt"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-west-2

      - name: Bootstrap Terraform backend
        run: |
          set -euo pipefail
          BUCKET=yuriiavr-tf-state-lesson-7
          TABLE=terraform-locks
          if ! aws s3api head-bucket --bucket "$BUCKET" 2>/dev/null; then
            aws s3api create-bucket --bucket "$BUCKET" --region us-west-2 \
              --create-bucket-configuration LocationConstraint=us-west-2
            aws s3api put-bucket-versioning --bucket "$BUCKET" \
              --versioning-configuration Status=Enabled
          fi
          if ! aws dynamodb describe-table --table-name "$TABLE" --region us-west-2 >/dev/null 2>&1; then
            aws dynamodb create-table --table-name "$TABLE" \
              --attribute-definitions AttributeName=LockID,AttributeType=S \
              --key-schema AttributeName=LockID,KeyType=HASH \
              --billing-mode PAY_PER_REQUEST --region us-west-2
            aws dynamodb wait table-exists --table-name "$TABLE" --region us-west-2
          fi

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.5"

      - name: Terraform apply
        working-directory: lesson-7
        run: |
          terraform init -input=false
          terraform import -input=false module.s3_backend.aws_s3_bucket.terraform_state yuriiavr-tf-state-lesson-7 || true
          terraform import -input=false module.s3_backend.aws_dynamodb_table.terraform_locks terraform-locks || true
          terraform apply -input=false -auto-approve
          echo "ECR_URL=$(terraform output -raw ecr_repository_url)" >> "$GITHUB_ENV"

      - name: Build and push Django image to ECR
        run: |
          aws ecr get-login-password --region us-west-2 \
            | docker login --username AWS --password-stdin "${ECR_URL%%/*}"
          TAG="${GITHUB_SHA::7}"
          docker build -t "$ECR_URL:$TAG" -t "$ECR_URL:latest" .
          docker push "$ECR_URL:$TAG"
          docker push "$ECR_URL:latest"

      - uses: azure/setup-helm@v4
        with:
          version: v3.15.2

      - name: Deploy with Helm
        run: |
          aws eks update-kubeconfig --region us-west-2 --name lesson-7-eks
          kubectl apply -f https://github.com/kubernetes-sigs/metrics-server/releases/latest/download/components.yaml
          helm upgrade --install django-app ./lesson-7/charts/django-app \
            --set image.repository="$ECR_URL" \
            --set image.tag="${GITHUB_SHA::7}" \
            --wait --timeout 5m
          kubectl get deploy,pods,svc,hpa,configmap -l app=django-app -o wide
