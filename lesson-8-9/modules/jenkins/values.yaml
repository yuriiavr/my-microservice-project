# Конфігурація Helm-чарта jenkins/jenkins.
# adminUser / adminPassword додаються з Terraform (set / set_sensitive).
controller:
  # Зовнішній доступ до UI через AWS LoadBalancer.
  serviceType: LoadBalancer

  resources:
    requests:
      cpu: "500m"
      memory: "1Gi"
    limits:
      cpu: "2"
      memory: "4Gi"

  # Плагіни поверх дефолтних (kubernetes, git, workflow-aggregator, configuration-as-code
  # чарт ставить сам). github — для роботи з GitHub-репозиторієм.
  additionalPlugins:
    - github

# Динамічні агенти в Kubernetes (kaniko-под описується в Jenkinsfile).
agent:
  enabled: true

rbac:
  create: true

serviceAccount:
  create: true
  name: jenkins

# Персистентний том для $JENKINS_HOME (через EBS CSI / StorageClass gp3).
persistence:
  enabled: true
  storageClass: "gp3"
  size: 8Gi
